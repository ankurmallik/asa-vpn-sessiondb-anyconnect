# ASA VPN Session Collector Configuration Example
# Copy this to config.yaml and fill in your values.

# List of ASA device IP addresses or hostnames to collect sessions from
devices:
  - 192.168.1.1
  - 192.168.1.2
  - asa.example.com

# Collection settings
collection:
  # Maximum number of concurrent SSH connections (default: 20, max recommended: 50)
  max_workers: 20

  # Number of retries for failed SSH connections (default: 3)
  retries: 3

  # Exponential backoff base in seconds for retry delays (default: 2.0)
  # Delay = retry_backoff_base ^ attempt_number
  retry_backoff_base: 2.0

  # SSH connection timeout in seconds (default: 30)
  timeout: 30

# Output settings
output:
  # Directory to write output files (default: ".")
  directory: "."

  # Excel filename for AnyConnect session data (default: "AnyConnect-Sessions.xlsx")
  excel_filename: "AnyConnect-Sessions.xlsx"

# Email notification settings
email:
  # Enable email notifications (default: false)
  enabled: false

  # SMTP server hostname or IP
  smtp_server: "smtp.example.com"

  # SMTP server port (default: 587)
  smtp_port: 587

  # Enable STARTTLS for SMTP (default: true)
  tls: true

  # SMTP username (optional — leave blank or omit for no authentication)
  # WARNING: Never commit real credentials to git. Use environment variables or secrets management.
  smtp_username: ""

  # SMTP password (optional — leave blank or omit for no authentication)
  # WARNING: Never commit real credentials to git. Use environment variables or secrets management.
  smtp_password: ""

  # Email sender address
  from_address: "noreply@example.com"

  # List of recipient email addresses
  recipients:
    - admin@example.com
    - operations@example.com
